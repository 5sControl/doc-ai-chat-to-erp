name: kokoro_tts_flutter
description: Vendored kokoro_tts_flutter (upstream 0.2.0+1) with filesystem voices.json loading for downloaded models.
version: 0.2.0+1-summify.1
homepage: https://github.com/yansigit
repository: https://github.com/yansigit/kokoro_tts_flutter

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  path: ^1.8.3
  path_provider: ^2.1.1
  malsami: ^0.0.3
  flutter_onnxruntime: ^1.4.3  # For ONNX model inference
  just_audio: ^0.10.3     # For audio playback
  http: ^1.1.0            # For downloading model files
  collection: ^1.18.0
  async: ^2.12.0

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  assets:
    - assets/
